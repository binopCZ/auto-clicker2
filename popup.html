<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auto Clicker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 240px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      background: #020917;
      color: #e2eeff;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 90% 60% at 10% 0%,   rgba(37,99,235,.22)  0%, transparent 65%),
        radial-gradient(ellipse 70% 50% at 90% 5%,   rgba(99,102,241,.14) 0%, transparent 60%),
        radial-gradient(ellipse 80% 70% at 50% 110%, rgba(29,78,216,.10)  0%, transparent 65%),
        linear-gradient(175deg, #050e24 0%, #020917 100%);
      overflow: hidden;
    }

    .bg::before {
      content: '';
      position: absolute;
      inset: -80px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        rgba(37,99,235,.00)   0deg,
        rgba(37,99,235,.70)   60deg,
        rgba(99,102,241,.60)  120deg,
        rgba(59,130,246,.65)  180deg,
        rgba(147,197,253,.55) 240deg,
        rgba(37,99,235,.00)   300deg
      );
      animation: pop-rotate 6s linear infinite;
      opacity: .50;
      filter: blur(10px);
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(22px);
      opacity: 0;
      animation: pop-float linear infinite;
    }

    .orb-1 {
      width:80px; height:80px; left:6%;  bottom:-30px;
      background:radial-gradient(circle at 40% 40%, rgba(37,99,235,.55),  transparent 70%);
      animation-duration:7s; animation-delay:0s;
    }

    .orb-2 {
      width:60px; height:60px; right:8%; bottom:-20px;
      background:radial-gradient(circle at 40% 40%, rgba(99,102,241,.50), transparent 70%);
      animation-duration:9s; animation-delay:3s;
    }

    .orb-3 {
      width:50px; height:50px; left:40%; bottom:-20px;
      background:radial-gradient(circle at 40% 40%, rgba(59,130,246,.45),  transparent 70%);
      animation-duration:11s; animation-delay:5s;
    }

    @keyframes pop-rotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes pop-float {
      0%   { transform: translateY(0)     scale(1.00); opacity: 0;   }
      15%  { opacity: .55; }
      50%  { transform: translateY(-55px) scale(1.08); opacity: .42; }
      85%  { opacity: .48; }
      100% { transform: translateY(-110px) scale(.90); opacity: 0;  }
    }

    @media (prefers-reduced-motion: reduce) {
      .bg::before, .orb { animation: none; }
    }

    body.theme-green .bg {
      background:
        radial-gradient(ellipse 90% 60% at 10% 0%,   rgba(21,128,61,.22)  0%, transparent 65%),
        radial-gradient(ellipse 70% 50% at 90% 5%,   rgba(5,150,105,.14)  0%, transparent 60%),
        radial-gradient(ellipse 80% 70% at 50% 110%, rgba(20,83,45,.10)   0%, transparent 65%),
        linear-gradient(175deg, #021a0c 0%, #011208 100%);
    }

    body.theme-green .bg::before {
      background: conic-gradient(
        from 0deg,
        rgba(21,128,61,.00)   0deg,
        rgba(21,128,61,.72)   60deg,
        rgba(5,150,105,.62)   120deg,
        rgba(34,197,94,.68)   180deg,
        rgba(74,222,128,.58)  240deg,
        rgba(21,128,61,.00)   300deg
      );
    }

    body.theme-green .orb-1 {
      background: radial-gradient(circle at 40% 40%, rgba(21,128,61,.55),  transparent 70%);
    }

    body.theme-green .orb-2 {
      background: radial-gradient(circle at 40% 40%, rgba(5,150,105,.50),  transparent 70%);
    }

    body.theme-green .orb-3 {
      background: radial-gradient(circle at 40% 40%, rgba(34,197,94,.45),  transparent 70%);
    }

    .wrap {
      position: relative;
      z-index: 1;
      padding: 16px 14px 14px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .logo {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(37,99,235,.28) 0%, rgba(99,102,241,.18) 100%);
      border: 1px solid rgba(96,165,250,.30);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo svg {
      color: #60a5fa;
      filter: drop-shadow(0 0 7px #60a5fa88);
    }

    body.theme-green .logo {
      background: linear-gradient(135deg, rgba(21,128,61,.28) 0%, rgba(5,150,105,.18) 100%);
      border-color: rgba(34,197,94,.30);
    }

    body.theme-green .logo svg {
      color: #22c55e;
      filter: drop-shadow(0 0 7px #22c55e88);
    }

    .title-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .app-title {
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #e2eeff;
      line-height: 1;
    }

    body.theme-green .app-title {
      color: #dcfce7;
    }

    .app-sub {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(226,238,255,.40);
    }

    body.theme-green .app-sub {
      color: rgba(220,252,231,.40);
    }

    .divider {
      height: 1px;
      margin-bottom: 14px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(96,165,250,.30) 30%,
        rgba(96,165,250,.30) 70%,
        transparent
      );
    }

    body.theme-green .divider {
      background: linear-gradient(
        90deg,
        transparent,
        rgba(34,197,94,.30) 30%,
        rgba(34,197,94,.30) 70%,
        transparent
      );
    }

    .section-label {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .10em;
      text-transform: uppercase;
      color: rgba(226,238,255,.40);
      margin-bottom: 8px;
    }

    body.theme-green .section-label {
      color: rgba(220,252,231,.40);
    }

    .mode-btns {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .mode-btn {
      flex: 1;
      padding: 11px 6px 10px;
      border-radius: 12px;
      border: 1px solid rgba(96,165,250,.22);
      background: rgba(5,14,36,.55);
      color: rgba(226,238,255,.60);
      cursor: pointer;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: all .20s ease;
      position: relative;
      overflow: hidden;
    }

    .mode-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(96,165,250,.08) 0%,
        transparent 100%
      );
      opacity: 0;
      transition: opacity .20s;
    }

    .mode-btn:hover::before {
      opacity: 1;
    }

    .mode-btn svg {
      opacity: .55;
      transition: opacity .20s, color .20s;
      color: #60a5fa;
    }

    .mode-btn:hover {
      border-color: rgba(96,165,250,.50);
      color: #e2eeff;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(37,99,235,.18);
    }

    .mode-btn:hover svg {
      opacity: 1;
    }

    .mode-btn.active {
      border-color: #60a5fa;
      background: rgba(37,99,235,.15);
      color: #e2eeff;
      box-shadow:
        0 0 0 1px rgba(96,165,250,.25),
        0 6px 20px rgba(37,99,235,.22);
    }

    .mode-btn.active svg {
      opacity: 1;
      color: #60a5fa;
    }

    .mode-btn:active {
      transform: translateY(0) scale(.97);
    }

    body.theme-green .mode-btn {
      border-color: rgba(34,197,94,.22);
      background: rgba(2,26,12,.55);
      color: rgba(220,252,231,.60);
    }

    body.theme-green .mode-btn::before {
      background: linear-gradient(
        180deg,
        rgba(34,197,94,.08) 0%,
        transparent 100%
      );
    }

    body.theme-green .mode-btn svg {
      color: #22c55e;
    }

    body.theme-green .mode-btn:hover {
      border-color: rgba(34,197,94,.50);
      color: #dcfce7;
      box-shadow: 0 6px 20px rgba(21,128,61,.18);
    }

    body.theme-green .mode-btn.active {
      border-color: #22c55e;
      background: rgba(21,128,61,.15);
      box-shadow:
        0 0 0 1px rgba(34,197,94,.25),
        0 6px 20px rgba(21,128,61,.22);
    }

    body.theme-green .mode-btn.active svg {
      color: #22c55e;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 11px;
      border-radius: 10px;
      border: 1px solid rgba(96,165,250,.16);
      background: rgba(5,14,36,.60);
      margin-bottom: 12px;
    }

    body.theme-green .info-row {
      border-color: rgba(34,197,94,.16);
      background: rgba(2,26,12,.60);
    }

    .info-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #60a5fa;
      box-shadow: 0 0 8px #60a5fa;
      flex-shrink: 0;
      animation: dot-pulse 2.2s ease-in-out infinite;
    }

    body.theme-green .info-dot {
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
    }

    @keyframes dot-pulse {
      0%, 100% { transform: scale(1);    opacity: 1;   }
      50%      { transform: scale(1.40); opacity: .60; }
    }

    .info-text {
      font-size: 10px;
      font-weight: 500;
      color: rgba(226,238,255,.60);
      line-height: 1.45;
    }

    body.theme-green .info-text {
      color: rgba(220,252,231,.60);
    }

    .info-text strong {
      color: #60a5fa;
      font-weight: 700;
    }

    body.theme-green .info-text strong {
      color: #22c55e;
    }

    #ac-open-btn {
      width: 100%;
      padding: 11px 0;
      border-radius: 999px;
      border: 0;
      cursor: pointer;
      font-weight: 900;
      font-size: 12px;
      letter-spacing: .10em;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(135deg, #22c55e 0%, #10b981 100%);
      box-shadow: 0 6px 22px rgba(34,197,94,.32);
      text-shadow: 0 1px 3px rgba(0,0,0,.25);
      transition: transform .12s, filter .18s, box-shadow .18s;
      margin-bottom: 12px;
    }

    #ac-open-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
      box-shadow: 0 10px 28px rgba(34,197,94,.50);
    }

    #ac-open-btn:active {
      transform: translateY(0) scale(.97);
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid rgba(96,165,250,.14);
    }

    body.theme-green .footer {
      border-top-color: rgba(34,197,94,.14);
    }

    .badge {
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(96,165,250,.28);
      background: rgba(96,165,250,.08);
      color: #60a5fa;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    body.theme-green .badge {
      border-color: rgba(34,197,94,.28);
      background: rgba(34,197,94,.08);
      color: #22c55e;
    }

    .footer-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #popup-theme-toggle {
      position: relative;
      width: 40px;
      height: 22px;
      border-radius: 20px;
      background: rgba(5,14,36,.70);
      border: 1px solid rgba(96,165,250,.28);
      cursor: pointer;
      transition: background .25s, border-color .25s;
      box-shadow: inset 0 1px 3px rgba(0,0,0,.35);
    }

    #popup-theme-knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #60a5fa;
      box-shadow: 0 2px 5px rgba(0,0,0,.40);
      transition:
        transform .28s cubic-bezier(.4,0,.2,1),
        background .25s;
    }

    body.theme-green #popup-theme-toggle {
      background: rgba(2,26,12,.70);
      border-color: rgba(34,197,94,.28);
    }

    body.theme-green #popup-theme-knob {
      transform: translateX(18px);
      background: #22c55e;
    }

    .footer-link {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #93c5fd;
      text-decoration: none;
      transition: color .18s;
    }

    .footer-link:hover {
      color: #60a5fa;
    }

    body.theme-green .footer-link {
      color: #4ade80;
    }

    body.theme-green .footer-link:hover {
      color: #22c55e;
    }
  </style>
</head>
<body>

  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="wrap">

    <div class="header">
      <div class="logo">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M12 8v4l3 3"></path>
        </svg>
      </div>
      <div class="title-block">
        <div class="app-title">Auto Clicker</div>
        <div class="app-sub">by Binop · v1.2.0</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-label">Select mode</div>

    <div class="mode-btns">
      <button class="mode-btn active" id="mode-single">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="6" y="3" width="12" height="18" rx="6"></rect>
          <path d="M12 3v7"></path>
          <circle cx="9" cy="10" r="2" fill="currentColor" stroke="none"></circle>
        </svg>
        Single
      </button>
      <button class="mode-btn" id="mode-multi">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"></circle>
          <circle cx="12" cy="12" r="4"></circle>
          <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"></circle>
          <line x1="12" y1="3" x2="12" y2="1"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="3"  y1="12" x2="1"  y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
        </svg>
        Multi
      </button>
    </div>

    <div class="info-row">
      <div class="info-dot"></div>
      <div class="info-text">
        Panel opens on the active tab.<br>
        <strong>Ctrl+P</strong> to start · <strong>Ctrl+E</strong> to stop.
      </div>
    </div>

    <button id="ac-open-btn">Open Panel</button>

    <div class="footer">
      <span class="badge">v1.2.0</span>
      <div class="footer-right">
        <div id="popup-theme-toggle" title="Toggle theme: Blue / Green">
          <div id="popup-theme-knob"></div>
        </div>
        <a href="https://binopcz.github.io/autoclicker-web"
           target="_blank" rel="noopener noreferrer" class="footer-link">
          Site
          <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
            <polyline points="15 3 21 3 21 9"></polyline>
            <line x1="10" y1="14" x2="21" y2="3"></line>
          </svg>
        </a>
      </div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>

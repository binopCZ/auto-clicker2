<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Auto Clicker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: dark;
    }

    body {
      width: 260px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: radial-gradient(circle at 0 0, #1e293b 0, #020617 55%);
      color: #e5e7eb;
      padding: 14px 14px 12px;
    }

    body.theme-green {
      background: radial-gradient(circle at 0 0, #064e3b 0, #022c22 55%);
      color: #ecfdf5;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .logo {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      border: 1px solid rgba(148,163,184,.7);
      flex-shrink: 0;
    }

    body.theme-green .logo {
      background: #022c22;
      border-color: rgba(52,211,153,.8);
    }

    .logo svg {
      color: #60a5fa;
    }

    body.theme-green .logo svg {
      color: #22c55e;
    }

    .title-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .title {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #9ca3af;
    }

    body.theme-green .subtitle {
      color: #a7f3d0;
    }

    .divider {
      height: 1px;
      margin: 8px 0 10px;
      background: linear-gradient(to right, transparent, rgba(148,163,184,.7), transparent);
    }

    .section-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 6px;
    }

    body.theme-green .section-label {
      color: #a7f3d0;
    }

    .mode-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .mode-button {
      flex: 1;
      padding: 10px 8px 9px;
      border-radius: 10px;
      border: 1px solid rgba(148,163,184,.7);
      background: #020617;
      color: #e5e7eb;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      transition: border-color .12s, background .12s, transform .08s;
    }

    .mode-button svg {
      opacity: .75;
    }

    .mode-button:hover {
      border-color: #60a5fa;
      background: #02091e;
    }

    .mode-button.active {
      border-color: #60a5fa;
      background: #0b1120;
    }

    body.theme-green .mode-button:hover {
      border-color: #22c55e;
      background: #022c22;
    }

    body.theme-green .mode-button.active {
      border-color: #22c55e;
      background: #022c22;
    }

    .info {
      font-size: 10px;
      color: #9ca3af;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    body.theme-green .info {
      color: #a7f3d0;
    }

    .info b {
      color: #e5e7eb;
      font-weight: 600;
    }

    body.theme-green .info b {
      color: #ecfdf5;
    }

    #open-panel-btn {
      width: 100%;
      padding: 10px 0;
      border-radius: 999px;
      border: 0;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #f9fafb;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      box-shadow: 0 8px 22px rgba(22,163,74,.5);
      margin-bottom: 10px;
      transition: transform .08s, box-shadow .12s, filter .12s;
    }

    #open-panel-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
      box-shadow: 0 12px 26px rgba(22,163,74,.6);
    }

    #open-panel-btn:active {
      transform: translateY(0) scale(.97);
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 6px;
      border-top: 1px solid rgba(148,163,184,.6);
      font-size: 9px;
      color: #9ca3af;
    }

    body.theme-green .footer {
      color: #a7f3d0;
      border-top-color: rgba(52,211,153,.7);
    }

    .badge {
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,.7);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 700;
      color: #e5e7eb;
    }

    .footer-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #popup-theme-toggle {
      position: relative;
      width: 34px;
      height: 18px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,.7);
      background: #020617;
      cursor: pointer;
    }

    #popup-theme-knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: #60a5fa;
      box-shadow: 0 1px 3px rgba(0,0,0,.7);
      transition: transform .18s cubic-bezier(.4,0,.2,1), background .16s;
    }

    body.theme-green #popup-theme-toggle {
      background: #022c22;
      border-color: rgba(52,211,153,.8);
    }

    body.theme-green #popup-theme-knob {
      transform: translateX(14px);
      background: #22c55e;
    }

    .footer-link {
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 700;
      color: #93c5fd;
    }

    .footer-link:hover {
      color: #bfdbfe;
    }

    body.theme-green .footer-link {
      color: #6ee7b7;
    }

    body.theme-green .footer-link:hover {
      color: #bbf7d0;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.4"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M12 8v4l3 3"></path>
      </svg>
    </div>
    <div class="title-block">
      <div class="title">Auto Clicker</div>
      <div class="subtitle">by Binop · v2.0.0</div>
    </div>
  </header>

  <div class="divider"></div>

  <div class="section-label">Mode</div>

  <div class="mode-buttons">
    <button class="mode-button active" id="popup-mode-single">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="6" y="3" width="12" height="18" rx="6"></rect>
        <path d="M12 3v7"></path>
        <circle cx="9" cy="10" r="2" fill="currentColor" stroke="none"></circle>
      </svg>
      Single
    </button>

    <button class="mode-button" id="popup-mode-multi">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"></circle>
        <circle cx="12" cy="12" r="4"></circle>
        <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"></circle>
        <line x1="12" y1="3" x2="12" y2="1"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="3"  y1="12" x2="1"  y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
      </svg>
      Multi
    </button>
  </div>

  <div class="info">
    Panel opens on the active tab.<br>
    Shortcuts are shown inside the panel.
  </div>

  <button id="open-panel-btn">Open panel</button>

  <footer class="footer">
    <span class="badge">v2.0.0</span>
    <div class="footer-right">
      <div id="popup-theme-toggle" title="Toggle theme">
        <div id="popup-theme-knob"></div>
      </div>
      <a class="footer-link" href="https://binopcz.github.io/autoclicker-web"
         target="_blank" rel="noopener noreferrer">
        Site
      </a>
    </div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Auto Clicker</title>

    <!-- Reuse the same Aurora Glass UI as the in-page panel -->
    <link rel="stylesheet" href="styles.css" />

    <!-- Popup-only overrides -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 292px; 
        background: transparent;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      }
      #ac-panel {
        position: relative;
        bottom: auto;
        right: auto;
        inset: auto;
        margin: 0;
      }
      #ac-close { display: none; }
      #ac-panel a { color: inherit; }
    </style>

    <script src="popup.js" defer></script>
  </head>

  <body>
    <div id="ac-panel" data-theme="dark">
      <!-- Header -->
      <div id="ac-header">
        <div id="ac-title">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"></path>
            <path d="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"></path>
            <path d="M12 2v2"></path>
            <path d="M12 20v2"></path>
            <path d="m4.93 4.93 1.41 1.41"></path>
            <path d="m17.66 17.66 1.41 1.41"></path>
            <path d="M2 12h2"></path>
            <path d="M20 12h2"></path>
            <path d="m6.34 17.66-1.41 1.41"></path>
            <path d="m19.07 4.93-1.41 1.41"></path>
          </svg>
          <span>Auto Clicker</span>
        </div>

        <div id="ac-header-right">
          <!-- Professional UI Toggle Switch -->
          <div id="ac-theme-toggle" role="switch" title="Toggle Theme">
            <div id="ac-theme-knob"></div>
          </div>
        </div>
      </div>

      <!-- Body -->
      <div id="ac-body">
        <!-- Removed "Panel: Ready" status row for the popup -->

        <p class="info-text" style="margin: 0 0 8px; color: var(--muted); font-size: 12px; line-height: 1.35; text-align: center;">
          Open the control panel on the current tab to start clicking.
        </p>

        <!-- Main button -->
        <button class="ac-pos-btn" id="open-panel" type="button">
          Open Panel Here
        </button>

        <div class="ac-divider"></div>

        <div class="ac-footer">
          <span class="ac-badge">v1.1.2</span>
          <span class="ac-credits">
            By <span class="ac-brand">BINOP</span>
            ·
            <!-- Improved Website Link -->
            <a href="https://binopcz.github.io/autoclicker-web/" target="_blank" rel="noopener noreferrer" class="ac-footer-link">
              Website
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
            </a>
          </span>
        </div>
      </div>
    </div>
  </body>
</html>
